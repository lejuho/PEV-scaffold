<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PEV Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Planner · Executor · Verifier</p>
        <h1>PEV Dashboard</h1>
      </div>
      <div class="top-actions">
        <button id="themeToggle" type="button" class="language-toggle" aria-label="Toggle theme">◐</button>
        <button id="languageToggle" type="button" class="language-toggle" aria-label="Toggle language">KO</button>
        <button id="refresh" type="button">Refresh</button>
        <button id="newProject" type="button" class="good">＋ New</button>
        <label class="toggle"><input id="showArchived" type="checkbox" /> <span id="showArchivedLabel">Show archived/hidden</span></label>
      </div>
    </header>

    <dialog id="initDialog" class="init-dialog">
      <form id="initForm" method="dialog">
        <h2 id="initTitle">New Project</h2>
        <label class="field"><span id="fName">Name (id)</span>
          <input name="name" required pattern="[a-z0-9][a-z0-9._-]*" placeholder="my-project" /></label>
        <label class="field"><span id="fSource">Source</span>
          <select name="source">
            <option value="new">New GitHub repo (gh create + clone)</option>
            <option value="clone">Clone existing remote</option>
            <option value="local">Existing local directory</option>
          </select></label>
        <label class="field" data-init-field="repo"><span id="fRepo">Repo URL / name</span>
          <input name="repo" placeholder="https://github.com/me/repo.git" /></label>
        <label class="field"><span id="fDest">Directory</span>
          <input name="dest" placeholder="/home/pi/my-project (default: ~/name)" /></label>
        <label class="field"><span id="fDriver">Driver</span>
          <select name="driver">
            <option value="headless">headless (no tmux, resumable sessions)</option>
            <option value="tmux">tmux (interactive panes)</option>
          </select></label>
        <label class="field" data-init-field="visibility"><span id="fVisibility">Visibility</span>
          <select name="visibility"><option value="private">private</option><option value="public">public</option></select></label>
        <label class="field"><span id="fClaudeModel">Executor model</span>
          <select name="claudeModel">
            <option value="sonnet">sonnet (template default)</option>
            <option value="opus">opus</option>
            <option value="haiku">haiku</option>
          </select></label>
        <label class="field"><span id="fClaudeEffort">Executor effort</span>
          <select name="claudeEffort">
            <option value="">(CLI default)</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="xhigh">xhigh</option>
            <option value="max">max</option>
          </select></label>
        <label class="field"><span id="fStack">Stack (1 line, optional)</span>
          <input name="stack" placeholder="FastAPI + SQLite + React PWA" /></label>
        <label class="field"><span id="fInitSpec">Spec (optional)</span>
          <textarea name="spec" rows="3" placeholder="Initial product spec → docs/spec/spec.md"></textarea></label>
        <label class="field"><span id="fInitDesign">Design system (optional)</span>
          <textarea name="design" rows="3" placeholder="Design tokens / UI rules → docs/design/design.md"></textarea></label>
        <div class="init-actions">
          <button type="button" id="initCancel">Cancel</button>
          <button type="submit" class="good" id="initSubmit">Create</button>
        </div>
      </form>
    </dialog>

    <dialog id="contextDialog" class="init-dialog">
      <form id="contextForm" method="dialog">
        <h2 id="ctxTitle">Context files</h2>
        <div id="ctxList" class="ctx-list"></div>
        <label class="field"><span id="fCtxCategory">Category</span>
          <select name="category">
            <option value="spec">spec (Planner)</option>
            <option value="design">design (Executor)</option>
          </select></label>
        <label class="field"><span id="fCtxName">Filename</span>
          <input name="name" placeholder="auth.md / tokens.css (optional)" pattern="[A-Za-z0-9][A-Za-z0-9._-]*" /></label>
        <label class="field"><span id="fCtxContent">Content</span>
          <textarea name="content" rows="6" placeholder="Paste, or attach a file below"></textarea></label>
        <label class="field ctx-file-row"><span id="fCtxUpload">Attach file (read as text)</span>
          <input type="file" id="ctxUpload" accept=".md,.css,.txt,.json,text/*" /></label>
        <div class="init-actions">
          <button type="button" id="ctxCancel">Close</button>
          <button type="submit" class="good" id="ctxSubmit">Add</button>
        </div>
      </form>
    </dialog>

    <main>
      <section id="subscriptionUsage" class="panel usage-panel" aria-live="polite"></section>
      <section id="projects" class="projects"></section>
      <section class="panel">
        <h2 id="consoleTitle">Console</h2>
        <form id="sendForm" class="send-form">
          <select id="sendProject" aria-label="Project"></select>
          <select id="sendTarget" aria-label="Target">
            <option value="claude">Claude</option>
            <option value="codex">Codex</option>
          </select>
          <input id="sendMessage" type="text" placeholder="Message to send via /say" autocomplete="off" />
          <button id="sendButton" type="submit">Send</button>
        </form>
        <pre id="console">Ready.</pre>
      </section>
    </main>

    <nav id="quickbar" class="quickbar" aria-label="Quick actions"></nav>
    <script src="/static/app.js"></script>
  </body>
</html>
